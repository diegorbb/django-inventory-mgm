<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: { DEFAULT: '#0a0a0a', 1: '#111111', 2: '#1a1a1a', 3: '#222222' },
                        border: { DEFAULT: '#2a2a2a', light: '#333333' },
                        accent: { DEFAULT: '#f0f0f0', muted: '#888888', dim: '#555555' },
                        brand: { DEFAULT: '#3b82f6', hover: '#2563eb', dim: '#1d4ed8' },
                        danger: { DEFAULT: '#ef4444', bg: '#1f0909' },
                        warn: { DEFAULT: '#f59e0b', bg: '#1a1200' },
                        ok: { DEFAULT: '#22c55e', bg: '#061a0e' },
                    },
                    fontFamily: { mono: ['ui-monospace', 'SFMono-Regular', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { display: flex; flex-direction: column; min-height: 100vh; background: #0a0a0a; color: #e5e5e5; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
        .input-base { display: block; width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 8px 12px; color: #e5e5e5; font-size: 14px; outline: none; transition: border-color 0.15s; }
        .input-base:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
        .input-base::placeholder { color: #555; }
        .btn-primary { display: inline-flex; align-items: center; gap: 6px; background: #f0f0f0; color: #0a0a0a; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; text-decoration: none; }
        .btn-primary:hover { background: #d4d4d4; }
        .btn-ghost { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: #888; border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; }
        .btn-ghost:hover { color: #e5e5e5; border-color: #444; background: #1a1a1a; }
        .btn-danger { display: inline-flex; align-items: center; gap: 6px; background: #ef4444; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; text-decoration: none; }
        .btn-danger:hover { background: #dc2626; }
        .card { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
        .badge-open { background: #061a0e; color: #22c55e; border: 1px solid #15803d44; }
        .badge-pending { background: #1a1200; color: #f59e0b; border: 1px solid #92400e44; }
        .badge-closed, .badge-resolved { background: #1a1a1a; color: #888; border: 1px solid #33333344; }
        .badge-high { background: #1f0909; color: #ef4444; border: 1px solid #991b1b44; }
        .badge-medium { background: #1a1200; color: #f59e0b; border: 1px solid #92400e44; }
        .badge-low { background: #0a0f1a; color: #3b82f6; border: 1px solid #1d4ed844; }
        .badge-urgent { background: #1f0909; color: #f97316; border: 1px solid #9a3412; }
        .badge-active { background: #061a0e; color: #22c55e; border: 1px solid #15803d44; }
        .badge-inactive { background: #1a1a1a; color: #888; border: 1px solid #33333344; }
        .table-base { width: 100%; border-collapse: collapse; font-size: 13px; }
        .table-base thead th { padding: 10px 16px; text-align: left; color: #555; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #2a2a2a; }
        .table-base tbody td { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; color: #aaa; vertical-align: middle; }
        .table-base tbody tr:hover td { background: #111; }
        .table-base tbody tr:last-child td { border-bottom: none; }
        .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; font-size: 13px; color: #888; text-decoration: none; transition: all 0.15s; }
        .sidebar-link:hover { color: #e5e5e5; background: #1a1a1a; }
        .sidebar-link.active { color: #e5e5e5; background: #1a1a1a; }
        .sidebar-link svg { flex-shrink: 0; opacity: 0.7; }
        .sidebar-link:hover svg, .sidebar-link.active svg { opacity: 1; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .page-title { font-size: 18px; font-weight: 600; color: #e5e5e5; }
        .page-subtitle { font-size: 13px; color: #555; margin-top: 2px; }
        .stat-card { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; }
        .stat-value { font-size: 28px; font-weight: 600; color: #e5e5e5; font-variant-numeric: tabular-nums; }
        .stat-label { font-size: 12px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 500; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
        .divider { height: 1px; background: #2a2a2a; margin: 0; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; color: #555; text-align: center; }
        .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 4px; }
        .empty-state p { font-size: 13px; }
        select.input-base option { background: #111; }
        textarea.input-base { resize: vertical; min-height: 80px; }
    </style>
    <script>
        if (localStorage.theme === 'dark' || !('theme' in localStorage)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body>
    {% include "navbar.html" %}
    <div class="flex flex-1 pt-12">
        {% block sidebar %}{% include "sidebar.html" %}{% endblock %}
        <main class="flex-1 ml-52 min-h-screen">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
