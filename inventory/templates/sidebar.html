<aside style="position:fixed;top:48px;left:0;bottom:0;width:208px;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg);">
    <nav style="flex:1;padding:12px;display:flex;flex-direction:column;gap:2px;">
        <p style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-4);padding:6px 8px 4px;margin:0;">Main</p>
        <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a href="{% url 'inventory' %}" class="sidebar-link {% if request.resolver_match.url_name == 'inventory' %}active{% endif %}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            Inventory
        </a>
        <a href="{% url 'incidents' %}" class="sidebar-link {% if 'incident' in request.resolver_match.url_name %}active{% endif %}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Incidents
        </a>
        <a href="{% url 'assets' %}" class="sidebar-link {% if 'asset' in request.resolver_match.url_name %}active{% endif %}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Assets
        </a>
        <a href="{% url 'software-list' %}" class="sidebar-link {% if 'software' in request.resolver_match.url_name %}active{% endif %}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Software
        </a>
        {% if user.is_staff %}
        <div style="height:1px;background:var(--border);margin:8px 0;"></div>
        <p style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-4);padding:2px 8px 4px;margin:0;">Admin</p>
        <a href="{% url 'users' %}" class="sidebar-link {% if 'user' in request.resolver_match.url_name %}active{% endif %}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Users
        </a>
        {% endif %}
    </nav>
    <div style="padding:12px;border-top:1px solid var(--border);">
        {% if user.is_authenticated %}
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="sidebar-link" style="border:none;background:none;cursor:pointer;width:100%;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Log out
            </button>
        </form>
        {% endif %}
    </div>
</aside>
