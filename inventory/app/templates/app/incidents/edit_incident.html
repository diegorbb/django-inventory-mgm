{% extends "main.html" %}
{% block title %}Edit Incident — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:600px;">
    <div class="page-header">
        <div>
            <a href="{% url 'incident' incident.id %}" class="text-xs" style="color:#555;text-decoration:none;">← Incident</a>
            <h1 class="page-title" style="margin-top:6px;">Edit incident</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" value="{{ incident.subject }}" class="input-base" required>
            </div>
            <div class="grid gap-4" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="input-base">
                        <option value="O" {% if incident.status == 'O' %}selected{% endif %}>Open</option>
                        <option value="P" {% if incident.status == 'P' %}selected{% endif %}>Pending</option>
                        <option value="C" {% if incident.status == 'C' %}selected{% endif %}>Closed</option>
                        <option value="R" {% if incident.status == 'R' %}selected{% endif %}>Resolved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="input-base">
                        <option value="L" {% if incident.priority == 'L' %}selected{% endif %}>Low</option>
                        <option value="M" {% if incident.priority == 'M' %}selected{% endif %}>Medium</option>
                        <option value="H" {% if incident.priority == 'H' %}selected{% endif %}>High</option>
                        <option value="U" {% if incident.priority == 'U' %}selected{% endif %}>Urgent</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="input-base" rows="5" required>{{ incident.description }}</textarea>
            </div>
            <div class="flex justify-end gap-3 mt-6" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'incident' incident.id %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Save changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
