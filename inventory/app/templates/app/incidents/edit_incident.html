{% extends "main.html" %}

{% block content %}

{% include "navbar.html" %}

{% include "sidebar.html" %}

<div class="flex justify-center items-center h-screen">
    <div class="w-full sm:max-w-md p-4">
        <div class="relative overflow-x-auto">
            <h2 class="mb-4 text-1xl font-extrabold leading-none tracking-tight text-gray-900 md:text-5xl lg:text-6xl dark:text-white">Edit<mark class="px-2 text-white bg-green-600 rounded dark:bg-green-500">Incident</mark></h2>
            <form class="" method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div>
                    <button type="submit" class="text-blue-700 hover:text-white border border-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2 dark:border-blue-500 dark:text-blue-500 dark:hover:text-white dark:hover:bg-blue-500 dark:focus:ring-blue-800">Submit</button>
                    <a class="text-gray-900 hover:text-white border border-gray-800 hover:bg-gray-900 focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2 dark:border-gray-600 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-600 dark:focus:ring-gray-800" href="{{request.META.HTTP_REFERER}}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
