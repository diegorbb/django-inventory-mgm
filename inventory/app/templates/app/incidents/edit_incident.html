{% extends "main.html" %}
{% block title %}Edit #{{ incident.id }} — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:680px;">
    <div style="margin-bottom:20px;">
        <a href="{% url 'incident' incident.id %}" class="text-xs" style="color:#555;text-decoration:none;">← #{{ incident.id }} {{ incident.subject|truncatechars:40 }}</a>
        <h1 class="page-title" style="margin-top:6px;">Edit incident</h1>
    </div>

    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}

            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:#555;">Details</p>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" value="{{ incident.subject }}" class="input-base" required>
            </div>
            <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select name="category" class="input-base">
                        {% for val, label in categories %}
                        <option value="{{ val }}" {% if incident.category == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="input-base">
                        <option value="L" {% if incident.priority == 'L' %}selected{% endif %}>Low</option>
                        <option value="M" {% if incident.priority == 'M' %}selected{% endif %}>Medium</option>
                        <option value="H" {% if incident.priority == 'H' %}selected{% endif %}>High</option>
                        <option value="U" {% if incident.priority == 'U' %}selected{% endif %}>Urgent</option>
                    </select>
                </div>
            </div>

            <div class="divider mb-6"></div>
            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:#555;">Assignment</p>
            <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="input-base">
                        <option value="O" {% if incident.status == 'O' %}selected{% endif %}>Open</option>
                        <option value="P" {% if incident.status == 'P' %}selected{% endif %}>Pending</option>
                        <option value="R" {% if incident.status == 'R' %}selected{% endif %}>Resolved</option>
                        <option value="C" {% if incident.status == 'C' %}selected{% endif %}>Closed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Assign to</label>
                    <select name="assigned_to" class="input-base">
                        <option value="">— Unassigned —</option>
                        {% for agent in agents %}
                        <option value="{{ agent.id }}" {% if incident.assigned_to and incident.assigned_to.id == agent.id %}selected{% endif %}>{{ agent.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="divider mb-6"></div>
            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:#555;">Description</p>
            <div class="form-group mb-6">
                <textarea name="description" class="input-base" rows="8" required>{{ incident.description }}</textarea>
            </div>

            <div class="flex justify-end gap-3" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'incident' incident.id %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Save changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
