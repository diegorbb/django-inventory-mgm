{% extends "main.html" %}
{% block title %}New Incident — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:680px;">
    <div style="margin-bottom:20px;">
        <a href="{% url 'incidents' %}" class="text-xs" style="color:var(--text-4);text-decoration:none;">← Incidents</a>
        <h1 class="page-title" style="margin-top:6px;">New incident</h1>
    </div>

    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}

            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:var(--text-4);">Details</p>
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="input-base" placeholder="Brief description of the issue" required autofocus>
            </div>
            <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select name="category" class="input-base">
                        {% for val, label in categories %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="input-base">
                        <option value="L">Low</option>
                        <option value="M">Medium</option>
                        <option value="H">High</option>
                        <option value="U">Urgent</option>
                    </select>
                </div>
            </div>

            <div class="divider mb-6"></div>
            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:var(--text-4);">Assignment</p>
            <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="input-base">
                        <option value="O">Open</option>
                        <option value="P">Pending</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Assign to</label>
                    <select name="assigned_to" class="input-base">
                        <option value="">— Unassigned —</option>
                        {% for agent in agents %}
                        <option value="{{ agent.id }}">{{ agent.username }}{% if agent.get_full_name %} ({{ agent.get_full_name }}){% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="divider mb-6"></div>
            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:var(--text-4);">Description</p>
            <div class="form-group mb-6">
                <textarea name="description" class="input-base" rows="7" placeholder="Describe the issue in detail — include steps to reproduce, error messages, affected systems, etc." required></textarea>
            </div>

            <div class="flex justify-end gap-3" style="padding-top:16px;border-top:1px solid var(--border);">
                <a href="{% url 'incidents' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Create incident</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
