{% extends "main.html" %}
{% block title %}New Incident — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:600px;">
    <div class="page-header">
        <div>
            <a href="{% url 'incidents' %}" class="text-xs" style="color:#555;text-decoration:none;">← Incidents</a>
            <h1 class="page-title" style="margin-top:6px;">New incident</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="input-base" required>
            </div>
            <div class="grid gap-4" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="input-base">
                        <option value="O">Open</option>
                        <option value="P">Pending</option>
                        <option value="C">Closed</option>
                        <option value="R">Resolved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="input-base">
                        <option value="L">Low</option>
                        <option value="M">Medium</option>
                        <option value="H">High</option>
                        <option value="U">Urgent</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="input-base" rows="5" required></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-6" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'incidents' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Create incident</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
