{% extends "main.html" %}
{% block title %}Edit Asset — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:640px;">
    <div class="page-header">
        <div>
            <a href="{% url 'assets' %}" class="text-xs" style="color:#555;text-decoration:none;">← Assets</a>
            <h1 class="page-title" style="margin-top:6px;">Edit asset</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex justify-end gap-3 mt-4" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'assets' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Save changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
