{% extends "main.html" %}

{% block content %}
{% include "sidebar.html" %}

<div class="p-4 sm:ml-64">
    <div class="max-w-2xl mx-auto py-8">
        <!-- Breadcrumb -->
        <nav class="flex mb-8" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a href="{% url 'assets' %}" class="inline-flex items-center text-sm font-medium text-gray-700 hover:text-blue-600 dark:text-gray-400 dark:hover:text-white">
                        <svg class="w-3 h-3 me-2.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                            <path d="m19.707 9.293-2-2-7-7a1 1 0 0 0-1.414 0l-7 7-2 2a1 1 0 0 0 1.414 1.414L2 10.414V18a2 2 0 0 0 2 2h3a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h3a2 2 0 0 0 2-2v-7.586l.293.293a1 1 0 0 0 1.414-1.414Z"/>
                        </svg>
                        Assets
                    </a>
                </li>
                <li aria-current="page">
                    <div class="flex items-center">
                        <svg class="w-3 h-3 mx-1 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
                        </svg>
                        <span class="ms-1 text-sm font-medium text-gray-500 md:ms-2 dark:text-gray-400">Edit Asset</span>
                    </div>
                </li>
            </ol>
        </nav>

        <!-- Form Card -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
            <div class="p-6">
                <h2 class="text-xl font-medium text-gray-900 dark:text-white mb-6">Edit Asset Details</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="space-y-6">
                        <div>
                            <label for="id_name" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Name</label>
                            <input type="text" id="id_name" name="name" value="{{ form.instance.name }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="id_tag" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Tag</label>
                            <input type="text" id="id_tag" name="tag" value="{{ form.instance.tag }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="id_model" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Model</label>
                            <select id="id_model" name="model" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                                {% for model in models %}
                                    <option value="{{ model.id }}" {% if model.id == form.instance.model.id %}selected{% endif %}>{{ model.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label for="id_hardware" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Hardware</label>
                            <input type="text" id="id_hardware" name="hardware" value="{{ form.instance.hardware }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="id_serial" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Serial</label>
                            <input type="text" id="id_serial" name="serial" value="{{ form.instance.serial }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="id_purchase_date" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Purchase Date</label>
                            <input type="date" id="id_purchase_date" name="purchase_date" value="{{ form.instance.purchase_date|date:'Y-m-d' }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="id_warranty" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Warranty</label>
                            <input type="date" id="id_warranty" name="warranty" value="{{ form.instance.warranty|date:'Y-m-d' }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="id_status" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Status</label>
                            <select id="id_status" name="status" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                                <option value="Active" {% if form.instance.status == 'Active' %}selected{% endif %}>Active</option>
                                <option value="Inactive" {% if form.instance.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                            </select>
                        </div>
                        <div>
                            <label for="id_assigned_to" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Assigned To</label>
                            <select id="id_assigned_to" name="assigned_to" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                                <option value="">Unassigned</option>
                                {% for user in users %}
                                    <option value="{{ user.id }}" {% if user.id == form.instance.assigned_to.id %}selected{% endif %}>{{ user.username }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label for="id_location" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Location</label>
                            <input type="text" id="id_location" name="location" value="{{ form.instance.location }}" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500">
                        </div>
                    </div>

                    <div class="mt-8 flex justify-end space-x-3">
                        <a href="{{request.META.HTTP_REFERER}}" 
                            class="rounded-lg px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-300 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-700">
                            Cancel
                        </a>
                        <button type="submit" 
                            class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
