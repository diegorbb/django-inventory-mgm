{% extends "main.html" %}
{% block title %}Add Asset — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:640px;">
    <div class="page-header">
        <div>
            <a href="{% url 'assets' %}" class="text-xs" style="color:#555;text-decoration:none;">← Assets</a>
            <h1 class="page-title" style="margin-top:6px;">Add asset</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}
            <div class="grid gap-4" style="grid-template-columns:1fr 1fr;">
                <div class="form-group"><label class="form-label">Name</label><input type="text" name="name" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Asset Tag</label><input type="text" name="tag" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Model</label><input type="text" name="model" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Hardware type</label><input type="text" name="hardware" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Serial number</label><input type="text" name="serial" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Location</label><input type="text" name="location" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Purchase date</label><input type="date" name="purchase_date" class="input-base" required></div>
                <div class="form-group"><label class="form-label">Warranty expiry</label><input type="date" name="warranty" class="input-base" required></div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="input-base">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-4" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'assets' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Add asset</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
