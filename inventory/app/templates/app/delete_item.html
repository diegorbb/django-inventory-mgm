{% extends "main.html" %}
{% block title %}Delete Item — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:440px;">
    <div class="card p-6" style="border-color:#991b1b44;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
            <div style="width:36px;height:36px;background:#1f0909;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </div>
            <div>
                <div style="font-size:15px;font-weight:600;color:var(--text);">Delete "{{ obj }}"?</div>
                <div style="font-size:13px;color:var(--text-4);margin-top:2px;">This cannot be undone.</div>
            </div>
        </div>
        <form method="POST" style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
            {% csrf_token %}
            <a href="{% url 'inventory' %}" class="btn-ghost">Cancel</a>
            <button type="submit" class="btn-danger">Delete item</button>
        </form>
    </div>
</div>
{% endblock %}
