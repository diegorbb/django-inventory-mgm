{% extends "main.html" %}
{% block title %}Edit Item — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:600px;">
    <div class="page-header">
        <div>
            <a href="{% url 'inventory' %}" class="text-xs" style="color:#555;text-decoration:none;">← Inventory</a>
            <h1 class="page-title" style="margin-top:6px;">Edit item</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" name="name" value="{{ form.instance.name }}" class="input-base" required>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="input-base" rows="3">{{ form.instance.description }}</textarea>
            </div>
            <div class="grid gap-4" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" value="{{ form.instance.location }}" class="input-base" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Min Quantity</label>
                    <input type="number" name="min_qty" value="{{ form.instance.min_qty }}" class="input-base" min="0">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Current Quantity</label>
                <input type="number" name="qty" value="{{ form.instance.qty }}" class="input-base" min="0" required>
            </div>
            <div class="flex justify-end gap-3 mt-6" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'inventory' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Save changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
