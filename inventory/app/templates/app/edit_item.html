{% extends "main.html" %}

{% block content %}

<div class="flex justify-center items-center h-screen">
    <div class="w-full sm:max-w-md p-4">
        <div class="relative overflow-x-auto">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="mt-6 text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Submit</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
