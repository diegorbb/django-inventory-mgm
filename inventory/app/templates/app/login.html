{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — InvMgm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{box-sizing:border-box;}body{margin:0;background:#0a0a0a;color:#e5e5e5;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .input-base{display:block;width:100%;background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:9px 12px;color:#e5e5e5;font-size:14px;outline:none;transition:border-color .15s;}
        .input-base:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
        .input-base::placeholder{color:#555;}
        .btn-primary{display:flex;align-items:center;justify-content:center;width:100%;background:#f0f0f0;color:#0a0a0a;border:none;border-radius:6px;padding:9px 14px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
        .btn-primary:hover{background:#d4d4d4;}
        .form-label{display:block;font-size:11px;font-weight:500;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
    </style>
</head>
<body>
    <div style="width:100%;max-width:360px;padding:24px;">
        <div style="text-align:center;margin-bottom:32px;">
            <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:16px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span style="font-size:16px;font-weight:600;color:#e5e5e5;">InvMgm</span>
            </div>
            <h1 style="font-size:20px;font-weight:600;color:#e5e5e5;margin:0 0 4px;">Sign in</h1>
            <p style="font-size:13px;color:#555;margin:0;">Enter your credentials to continue</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div style="background:#1f0909;border:1px solid #991b1b44;border-radius:6px;padding:10px 12px;font-size:13px;color:#ef4444;margin-bottom:16px;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST" style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:24px;">
            {% csrf_token %}
            <div style="margin-bottom:16px;">
                <label class="form-label" for="username">Username</label>
                <input class="input-base" type="text" id="username" name="username" placeholder="your-username" autofocus required>
            </div>
            <div style="margin-bottom:24px;">
                <label class="form-label" for="password">Password</label>
                <input class="input-base" type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Sign in</button>
        </form>
    </div>
</body>
</html>
