{% extends "main.html" %}

{% block content %}
{% include "navbar.html" %}
{% include "sidebar.html" %}

<div class="p-4 sm:ml-64">
    <div class="max-w-2xl mx-auto py-8">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700">
            <div class="p-6">
                <h2 class="text-xl font-medium text-gray-900 dark:text-white mb-6">Delete Software</h2>
                <p class="text-gray-700 dark:text-gray-300 mb-6">Are you sure you want to delete the software "{{ obj.name }}"?</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="flex justify-end space-x-3">
                        <a href="{% url 'software-list' %}" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600">
                            Cancel
                        </a>
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 dark:bg-red-600 dark:hover:bg-red-700">
                            Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
