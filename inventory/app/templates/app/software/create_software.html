{% extends "main.html" %}
{% block title %}Add Software — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:560px;">
    <div class="page-header">
        <div>
            <a href="{% url 'software-list' %}" class="text-xs" style="color:#555;text-decoration:none;">← Software</a>
            <h1 class="page-title" style="margin-top:6px;">Add software</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group"><label class="form-label">Name</label><input type="text" name="name" class="input-base" required></div>
            <div class="grid gap-4" style="grid-template-columns:1fr 1fr;">
                <div class="form-group"><label class="form-label">Version</label><input type="text" name="version" class="input-base" required></div>
                <div class="form-group"><label class="form-label">License seats</label><input type="number" name="license_count" class="input-base" min="1" required></div>
            </div>
            <div class="form-group"><label class="form-label">License key</label><input type="text" name="software_license" class="input-base" required></div>
            <div class="flex justify-end gap-3 mt-4" style="padding-top:16px;border-top:1px solid #2a2a2a;">
                <a href="{% url 'software-list' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Add software</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
