{% extends "main.html" %}
{% block title %}Add Software — InvMgm{% endblock %}
{% block content %}
<div class="p-6" style="max-width:640px;">
    <div class="page-header">
        <div>
            <a href="{% url 'software-list' %}" class="text-xs" style="color:var(--text-4);text-decoration:none;">← Software</a>
            <h1 class="page-title" style="margin-top:6px;">Add software</h1>
        </div>
    </div>
    <div class="card p-5">
        <form method="POST">
            {% csrf_token %}

            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:var(--text-4);">Product</p>
            <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr;">
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="input-base" placeholder="e.g. Adobe Photoshop" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Publisher</label>
                    <input type="text" name="publisher" class="input-base" placeholder="e.g. Adobe Inc.">
                </div>
                <div class="form-group">
                    <label class="form-label">Version</label>
                    <input type="text" name="version" class="input-base" placeholder="e.g. 25.0.1">
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="input-base" placeholder="e.g. Design, Security, Productivity">
                </div>
            </div>

            <div class="divider mb-6"></div>
            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:var(--text-4);">Licensing</p>
            <div class="grid gap-4 mb-6" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label class="form-label">License type</label>
                    <select name="license_type" class="input-base">
                        <option value="perpetual">Perpetual</option>
                        <option value="subscription">Subscription</option>
                        <option value="oem">OEM</option>
                        <option value="open_source">Open Source</option>
                        <option value="freeware">Freeware</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Seats / license count</label>
                    <input type="number" name="license_count" class="input-base" min="1" placeholder="1" required>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="form-label">License key</label>
                    <input type="text" name="software_license" class="input-base" placeholder="XXXX-XXXX-XXXX-XXXX" style="font-family:monospace;">
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="form-label">Expiry date <span style="color:var(--text-4);font-size:10px;font-weight:400;text-transform:none;letter-spacing:0;">(leave blank for perpetual)</span></label>
                    <input type="date" name="expiry_date" class="input-base">
                </div>
            </div>

            <div class="divider mb-6"></div>
            <p class="text-xs font-medium uppercase tracking-widest mb-4" style="color:var(--text-4);">Notes</p>
            <div class="form-group mb-6">
                <textarea name="notes" class="input-base" rows="3" placeholder="Purchase details, support contacts, renewal info…"></textarea>
            </div>

            <div class="flex justify-end gap-3" style="padding-top:16px;border-top:1px solid var(--border);">
                <a href="{% url 'software-list' %}" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Add software</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
